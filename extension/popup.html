<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f18;
      color: white;
    }
    .header {
      display: flex;
      items-center: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .title {
      font-weight: bold;
      font-size: 16px;
    }
    .status {
      font-size: 12px;
      color: #1db954;
      margin-bottom: 12px;
    }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px;
      color: white;
      font-size: 13px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      background: #1db954;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #1ed760;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">MediaVault Linker</div>
  </div>
  
  <div class="input-group">
    <label>MediaVault Instance URL</label>
    <input type="text" id="instanceUrl" placeholder="http://localhost:5000">
  </div>

  <div id="videoInfo" style="display:none; margin-bottom: 12px;">
    <p id="videoTitle" style="font-size: 13px; margin: 0; color: rgba(255,255,255,0.8);"></p>
  </div>

  <button id="downloadBtn">Send to MediaVault</button>

  <p id="statusMsg" style="font-size: 11px; margin-top: 12px; text-align: center; color: rgba(255,255,255,0.4);"></p>

  <script src="popup.js"></script>
</body>
</html>
